name: "🐞 Bug"
description: "버그 제보"
title: "[fix] "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: "📄 설명"
      description: "발생한 버그를 설명해 주세요."
      placeholder: "언제, 어디서, 어떻게 문제가 발생했는지 자세히 적어주세요."
    validations:
      required: true
  - type: textarea
    attributes:
      label: "✅ 작업할 내용"
      description: "해결을 위해 필요한 작업을 체크박스 형태로 작성해주세요."
      placeholder: |
        - [ ] 재현 조건 확인
        - [ ] 원인 분석
        - [ ] 수정 및 테스트
    validations:
      required: true
  - type: textarea
    attributes:
      label: "🙋🏻 참고 자료"
      description: "에러 로그, 스크린샷, 관련 이슈가 있다면 작성해 주세요."
