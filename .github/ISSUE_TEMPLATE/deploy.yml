name: "🚀 Deploy"
description: "배포 관련 작업"
title: "[deploy] "
labels: ["deploy"]
body:
  - type: textarea
    attributes:
      label: "📄 설명"
      description: "배포 작업의 목적과 범위를 작성해 주세요."
      placeholder: "어느 환경에 무엇을 배포하는지 자세히 적어주세요."
    validations:
      required: true
  - type: textarea
    attributes:
      label: "✅ 작업할 내용"
      description: "배포 전에 필요한 작업을 체크박스 형태로 작성해주세요."
      placeholder: |
        - [ ] 배포 대상 브랜치 확인
        - [ ] 환경 변수 점검
        - [ ] 배포 및 모니터링
    validations:
      required: true
  - type: textarea
    attributes:
      label: "🙋🏻 참고 자료"
      description: "배포 문서, 서버 정보, 체크해야 할 링크가 있다면 작성해 주세요."
