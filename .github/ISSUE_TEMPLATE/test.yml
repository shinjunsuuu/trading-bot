name: "🧪 Test"
description: "테스트 추가 및 개선"
title: "[test] "
labels: ["test"]
body:
  - type: textarea
    attributes:
      label: "📄 설명"
      description: "추가하거나 개선할 테스트 내용을 작성해 주세요."
      placeholder: "어떤 테스트를 왜 추가하거나 보강하는지 적어주세요."
    validations:
      required: true
  - type: textarea
    attributes:
      label: "✅ 작업할 내용"
      description: "테스트 작업을 체크박스 형태로 작성해주세요."
      placeholder: |
        - [ ] 테스트 대상 확인
        - [ ] 테스트 코드 작성 또는 수정
        - [ ] 실행 및 결과 확인
    validations:
      required: true
  - type: textarea
    attributes:
      label: "🙋🏻 참고 자료"
      description: "테스트 기준, 실패 로그, 관련 이슈가 있다면 작성해 주세요."
