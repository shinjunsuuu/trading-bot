name: "🧹 Chore"
description: "설정, 의존성, 기타 유지보수 작업"
title: "[chore] "
labels: ["chore"]
body:
  - type: textarea
    attributes:
      label: "📄 설명"
      description: "작업의 목적과 배경을 작성해 주세요."
      placeholder: "어떤 설정 또는 유지보수 작업인지 자세히 적어주세요."
    validations:
      required: true
  - type: textarea
    attributes:
      label: "✅ 작업할 내용"
      description: "진행할 작업을 체크박스 형태로 작성해주세요."
      placeholder: |
        - [ ] 작업 범위 확인
        - [ ] 설정 또는 유지보수 작업 수행
        - [ ] 영향 범위 점검
    validations:
      required: true
  - type: textarea
    attributes:
      label: "🙋🏻 참고 자료"
      description: "참고 문서, 링크, 관련 이슈가 있다면 작성해 주세요."
